name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[serve,dev]"
      - name: Lint
        run: ruff check omnirec scripts
      - name: Tests
        run: pytest --cov=omnirec --cov-report=term-missing
      - name: CLI smoke test
        run: |
          omnirec --version
          omnirec --items 400 --users 120 --epochs 4 demo --requests 200

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build serving image
        run: docker build -t omnirec-scale:ci .

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Kubernetes manifests
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -strict -ignore-missing-schemas kubernetes/deployment.yaml kubernetes/hpa.yaml
