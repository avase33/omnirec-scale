apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omnirec-serving
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omnirec-serving
  minReplicas: 3
  maxReplicas: 40
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Pods
      pods:
        metric:
          name: omnirec_latency_p95_ms
        target:
          type: AverageValue
          averageValue: "40"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
